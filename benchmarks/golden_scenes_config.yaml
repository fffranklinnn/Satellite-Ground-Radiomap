# Golden scenes config — uses actual available data files
# Derived from configs/mission_config.yaml with corrected data paths

mission:
  name: "SG-MRM Golden Scenes Capture"
  description: "Baseline capture for regression testing"
  version: "1.0"

origin:
  latitude: 34.3416
  longitude: 108.9398
  altitude_m: 397.0

rf:
  frequency_ghz: 14.5
  tx_power_dbm: 40.0
  tx_polarization: "RHCP"
  rx_polarization: "RHCP"

satellite:
  altitude_km: 550.0
  tle_file: null

time:
  start: "2025-01-03T00:00:00"
  end: "2025-01-03T00:00:00"
  step_hours: 6
  timezone: "UTC"

layers:
  l1_macro:
    enabled: true
    grid_size: 256
    coverage_km: 256.0
    resolution_m: 1000.0
    frequency_ghz: 14.5
    satellite_altitude_km: 550.0
    tle_file: null
    rain_rate_mm_h: 0.0
    tec: 10.0
    ionosphere:
      use_ipp: true
      use_slant_tec: true
      shell_height_km: 350.0
      max_mapping_factor: 8.0
      enable_faraday: false
      faraday_linear_only: true
      fallback_b_t: 4.5e-5
    polarization:
      mismatch_angle_deg: 0.0
      mode: "linear"
    ionex_file: "data/l1_space/data/cddis_data_2025/UPC0OPSRAP_20250030000_01D_15M_GIM.INX.gz"
    era5_file: "data/l1_space/data/data_stream-oper_stepType-instant.nc"
    tle_file: "data/starlink-2025-tle/2025-01-03.tle"

  l2_topo:
    enabled: true
    grid_size: 256
    coverage_km: 25.6
    resolution_m: 100.0
    dem_file: "data/l2_topo/china_dem_30.tif"
    frequency_ghz: 14.5
    satellite_elevation_deg: 15.0
    satellite_azimuth_deg: 180.0

  l3_urban:
    enabled: true
    grid_size: 256
    coverage_km: 0.256
    resolution_m: 1.0
    tile_cache_root: "data/l3_urban/xian/tiles_60"
    nlos_loss_db: 20.0
    occ_loss_db: 30.0
    incident_dir:
      az_deg: 180.0
      el_deg: 45.0

output:
  directory: "output"
  format: "png"
  save_individual_layers: true
  save_composite: true
  dpi: 150
  colormap: "viridis"

data_validation:
  strict: false

performance:
  enable_profiling: false
  parallel_processing: false
  num_workers: 4

logging:
  level: "INFO"
  log_file: null
  verbose: true
