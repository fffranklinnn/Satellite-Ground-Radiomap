# SG-MRM Mission Configuration
# This file defines the global simulation parameters

mission:
  name: "SG-MRM Simulation"
  description: "Satellite-Ground Multiscale Radio Map Generation"
  version: "1.0"

# Geographic origin (center point of simulation)
origin:
  latitude: 34.3416    # Xi'an, Shaanxi Province (degrees)
  longitude: 108.9398  # Xi'an, Shaanxi Province (degrees)
  altitude_m: 397.0    # Ground altitude above sea level

# RF parameters
rf:
  frequency_ghz: 14.5           # Operating frequency in GHz (Ku-band, matches L1 antenna design)
  tx_power_dbm: 40.0            # Transmit power in dBm
  tx_polarization: "RHCP"       # Transmit polarization (H/V/RHCP/LHCP)
  rx_polarization: "RHCP"       # Receive polarization

# Satellite parameters
satellite:
  altitude_km: 550.0            # Satellite altitude in km
  tle_file: null                # Path to TLE file (null for fixed position)
  # For V1.0: satellite is assumed at zenith
  # For V2.0: use TLE for orbit propagation

# Time parameters
time:
  start: "2025-01-01T00:00:00"  # Simulation start time (ISO format)
  end: "2025-01-01T23:00:00"    # Simulation end time
  step_hours: 6                 # Time step in hours
  timezone: "UTC"               # Timezone

# Layer configurations
layers:
  # L1: Macro/Space Layer (256 km coverage, 1000 m/pixel)
  l1_macro:
    enabled: true
    grid_size: 256
    coverage_km: 256.0
    resolution_m: 1000.0
    frequency_ghz: 14.5
    satellite_altitude_km: 550.0
    tle_file: null
    # Atmospheric parameters
    rain_rate_mm_h: 0.0         # Rain rate (0 for clear sky)
    # Ionospheric parameters
    tec: 10.0                   # Fallback TEC in TECU (used when ionex_file is absent)
    ionosphere:
      use_ipp: true             # Use IPP (350 km thin-shell) instead of ground point for TEC query
      use_slant_tec: true       # Convert VTEC -> STEC with obliquity factor
      shell_height_km: 350.0
      max_mapping_factor: 8.0
      enable_faraday: false     # Optional Faraday rotation + polarization mismatch
      faraday_linear_only: true # Apply only when polarization.mode == "linear"
      fallback_b_t: 4.5e-5      # Fallback |B_parallel| (Tesla) when geomagnetic backend unavailable
    polarization:
      mismatch_angle_deg: 0.0
      mode: "linear"            # linear / circular
    # Multi-satellite interference configuration
    interference:
      enable_interference: false  # Enable multi-satellite co-channel interference modeling
      tx_power_dbm: 40.0         # Satellite EIRP in dBm (Reference: FCC IBFS File No. SAT-LOA-20161115-00118)
      noise_floor_dbm: -110.0    # Equivalent noise floor in dBm (interference-dominated scenario)
      max_interfering_sats: 20   # Maximum number of interfering satellites to consider (performance optimization)
    # Real data sources (2025-01-01)
    ionex_file: "data/l1_space/data/cddis_data_2025/UPC0OPSRAP_20250010000_01D_15M_GIM.INX.gz"
    era5_file: "data/l1_space/data/data_stream-oper_stepType-instant.nc"   # optional; graceful fallback if absent
    tle_file: "data/2025_0101.tle"   # Starlink constellation TLE for 2025-01-01

  # L2: Terrain Layer (25.6 km coverage, 100 m/pixel)
  l2_topo:
    enabled: true
    grid_size: 256
    coverage_km: 25.6
    resolution_m: 100.0
    dem_file: "data/l2_topo/全国DEM数据.tif"
    frequency_ghz: 14.5         # Match L1 Ku-band frequency
    satellite_elevation_deg: 45.0
    satellite_azimuth_deg: 180.0

  # L3: Urban Layer (256 m coverage, 1 m/pixel)
  l3_urban:
    enabled: true
    grid_size: 256
    coverage_km: 0.256
    resolution_m: 1.0
    tile_cache_root: "data/l3_urban/xian/tiles_60"   # Path to tile cache directory
    nlos_loss_db: 20.0          # Loss applied to NLoS pixels
    occ_loss_db: 30.0           # Loss applied to building-occupied pixels
    incident_dir:               # Default incident direction (overridden per-call if needed)
      az_deg: 180.0             # Azimuth: 180 = from south (satellite in south)
      el_deg: 45.0              # Elevation angle in degrees

# Output configuration
output:
  directory: "output"           # Output directory
  format: "png"                 # Output format (png/npy/both)
  save_individual_layers: true  # Save L1/L2/L3 separately
  save_composite: true          # Save composite map
  dpi: 150                      # DPI for PNG output
  colormap: "viridis"           # Matplotlib colormap

# Data validation settings
data_validation:
  strict: false                 # Strict mode can also be enabled via main.py --strict-data

# Performance settings
performance:
  enable_profiling: false       # Enable performance profiling
  parallel_processing: false    # Enable parallel processing (V2.0)
  num_workers: 4                # Number of parallel workers

# Logging configuration
logging:
  level: "INFO"                 # Logging level (DEBUG/INFO/WARNING/ERROR)
  log_file: "sg_mrm.log"        # Log file path (null for console only)
  verbose: true                 # Verbose output
